<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetim Paneli</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="login-screen" class="admin-container">
    <div class="admin-box">
      <h2>Yönetim Paneli</h2>
      <p style="margin-bottom:1.5rem;color:#888;">Giriş yapmak için bilgilerinizi girin.</p>
      <form onsubmit="event.preventDefault(); login();">
        <input type="text" id="username" class="admin-input" placeholder="Kullanıcı Adı">
        <input type="password" id="password" class="admin-input" placeholder="Şifre">
        <button type="submit" class="admin-btn">Giriş Yap</button>
      </form>
      <p id="login-error" style="color:#ff4444;margin-top:1rem;display:none;font-size:0.9rem;"></p>
    </div>
  </div>

  <div id="dashboard" class="admin-container" style="display:none; align-items:flex-start; padding: 2rem;">
    <div class="admin-dashboard-container">
      <div class="admin-header">
        <h2>Yönetim Paneli</h2>
        <button onclick="logout()" class="admin-btn ghost">Çıkış Yap</button>
      </div>

      <div class="admin-grid">
        <!-- VİDEOLAR -->
        <div class="admin-card">
          <h3>Videolar (YouTube)</h3>
          <div class="yt-add-area" style="margin-bottom:1rem">
            <input id="yt-input" class="admin-input" type="text" placeholder="YouTube linki — youtube.com/watch?v=…">
            <input id="yt-title" class="admin-input" type="text" placeholder="Video başlığı (opsiyonel)" style="margin-top:0.5rem">
            <button class="admin-btn mt-2" onclick="addVideo()">Video Ekle</button>
          </div>
          <div id="admin-video-list" class="admin-list">
             <!-- JS Doldurur -->
          </div>
        </div>

        <!-- FOTOĞRAFLAR -->
        <div class="admin-card">
          <h3>Fotoğraflar</h3>
          <div style="margin-bottom:1rem;">
            <input type="file" id="foto-file" accept="image/*" class="admin-file">
            <button class="admin-btn mt-2" onclick="uploadMedia('fotograf')">Fotoğraf Yükle</button>
          </div>
          <div id="admin-foto-list" class="admin-list media-admin-list"></div>
        </div>

        <!-- GRAFİK TASARIM -->
        <div class="admin-card">
          <h3>Grafik Tasarım</h3>
          <div style="margin-bottom:1rem;">
            <input type="file" id="grafik-file" accept="image/*" class="admin-file">
            <button class="admin-btn mt-2" onclick="uploadMedia('grafik')">Görsel Yükle</button>
          </div>
          <div id="admin-grafik-list" class="admin-list media-admin-list"></div>
        </div>

      </div>
    </div>
  </div>

<script src="js/admin.js"></script>
</body>
</html>
